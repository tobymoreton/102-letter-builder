<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TMC Legal — Letter Builder</title>
<style>
  :root{ --navy:#16263f; --gold:#B59A6A; --ink:#22272e; --muted:#5f6b7a; --line:#e4e7ec; --bg:#eef1f5; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; line-height:1.5; }
  .wrap{ max-width:760px; margin:0 auto; padding:24px 20px 56px; }
  .top{ display:flex; align-items:center; gap:12px; margin:4px 0 20px; }
  .brandmark{ font-size:22px; font-weight:700; color:var(--navy); letter-spacing:.5px; }
  .brandmark .g{ color:var(--gold); }
  .top h1{ font-size:15px; font-weight:500; color:var(--muted); margin:0; padding-left:14px; border-left:1px solid #cdd4dd; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:18px; }
  .cap{ font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:#8a93a0; margin:0 0 10px; }
  .doctype{ font-size:15px; font-weight:600; color:var(--navy); margin:0 0 4px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:14px; }
  label{ display:block; font-size:13px; color:var(--muted); }
  input{ width:100%; margin-top:5px; padding:9px 11px; font-size:14px; border:1px solid #cfd6df; border-radius:8px; background:#fff; color:var(--ink); }
  input:focus{ outline:none; border-color:var(--navy); box-shadow:0 0 0 3px rgba(22,38,63,.12); }
  input[readonly]{ background:#f6f8fa; color:var(--muted); }
  select{ width:100%; margin-top:5px; padding:9px 11px; font-size:14px; border:1px solid #cfd6df; border-radius:8px; background:#fff; color:var(--ink); }
  select:focus{ outline:none; border-color:var(--navy); box-shadow:0 0 0 3px rgba(22,38,63,.12); }
  .actions{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:4px 0 18px; }
  button{ font-size:14px; padding:11px 20px; border-radius:9px; border:1px solid #cfd6df; background:#fff; color:var(--ink); cursor:pointer; transition:background .12s,transform .05s; }
  button:hover{ background:#f4f6f9; }
  button:active{ transform:scale(.98); }
  button.primary{ background:var(--navy); color:#fff; border-color:var(--navy); font-weight:600; }
  button.primary:hover{ background:#1d3253; }
  button.primary:disabled{ background:#9aa6b6; border-color:#9aa6b6; cursor:not-allowed; }
  #status{ font-size:13px; font-weight:500; min-height:18px; }
  .ok{ color:#1d7a4d; } .bad{ color:#b4413b; } .work{ color:var(--muted); }
  .hint{ font-size:12px; color:var(--muted); margin:14px 2px 0; }
  .missing{ border-color:#d99 !important; background:#fdf3f3 !important; }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <span class="brandmark">tmc<span class="g"> Legal</span></span>
  </div>

  <div class="card">
    <p class="doctype" id="doctype"></p>
    <p class="cap">Case</p>
    <div class="grid" id="field-grid"></div>
  </div>

  <div class="actions">
    <button id="b_make" class="primary">&#11015; Generate &amp; download .docx</button>
    <button id="b_reset">Reset</button>
    <span id="status"></span>
  </div>

  <p class="hint" id="hint"></p>

</div>

<!-- Vendored libraries (no CDN) -->
<script src="vendor/pizzip.min.js"></script>
<script src="vendor/pizzip-utils.min.js"></script>
<script src="vendor/docxtemplater.js"></script>

<script>
(function(){

  // ================================================================
  // TEMPLATE REGISTRY
  // To add a new template: add an entry here + master in masters/
  // ================================================================
  var TEMPLATES = {
    "InterPartesMemoOfAdvice": {
      displayName: "Inter Partes Memorandum of Advice",
      master: "masters/InterPartesMemoOfAdvice.docx",
      refField: "TMCRef",
      fields: [
        { id:"MatterName",  label:"Matter name (surname)",     required:true  },
        { id:"FeeEarner",   label:"Fee earner",                required:true  },
        { id:"Draftsman",   label:"Draftsman",                 required:true  },
        { id:"CaseRef",     label:"Client reference",          required:true  },
        { id:"TMCRef",      label:"TMC reference",             required:true  },
        { id:"Date",        label:"Date",                      required:false }
      ],
      hint: "Opened from the SharePoint case button, the fields above pre-fill automatically. Check them, then click <strong>Generate &amp; download</strong>. The completed memo downloads as a Word document for the draftsman to complete the figures and narrative."
    },
    "FormalServiceNonHJA": {
      displayName: "Formal Service Letter (Non-HJA)",
      master: "masters/FormalServiceNonHJA.docx",
      refField: "OurRef",
      downloadName: "FormalService",
      fields: [
        { id:"OppoFirm",         label:"Opponent firm",            required:true  },
        { id:"OppoAddress1",     label:"Opponent address 1",       required:true  },
        { id:"OppoAddress2",     label:"Opponent address 2",       required:false },
        { id:"OppoAddress3",     label:"Opponent address 3",       required:false },
        { id:"OppoAddress4",     label:"Opponent address 4",       required:false },
        { id:"OppoAddress5",     label:"Opponent address 5",       required:false },
        { id:"YourRef",          label:"Opponent reference",       required:false },
        { id:"OurRef",           label:"TMC reference",            required:true  },
        { id:"FullCaseName",     label:"Full case name",           required:true  },
        { id:"Firm",             label:"Instructing firm",         required:true  },
        { id:"TotalInterest",    label:"Total interest to date",   required:true  },
        { id:"DailyRatePeriod4", label:"Daily interest rate",      required:true  },
        { id:"Date",             label:"Date",                     required:false }
      ],
      hint: "Opened from the SharePoint case button, the fields above pre-fill automatically. Check the interest figures, then click <strong>Generate &amp; download</strong>."
    },
    "InformalServiceLetter": {
      displayName: "Informal Service Letter",
      master: "masters/InformalServiceLetter.docx",
      refField: "OurRef",
      fields: [
        { id:"OppoFirm",     label:"Opponent firm",        required:true  },
        { id:"OppoAddress1", label:"Opponent address 1",   required:true  },
        { id:"OppoAddress2", label:"Opponent address 2",   required:false },
        { id:"OppoAddress3", label:"Opponent address 3",   required:false },
        { id:"OppoAddress4", label:"Opponent address 4",   required:false },
        { id:"YourRef",      label:"Opponent reference",   required:false },
        { id:"OurRef",       label:"TMC reference",        required:true  },
        { id:"FullCaseName", label:"Full case name",       required:true  },
        { id:"Firm",         label:"Instructing firm",     required:true  },
        { id:"Date",         label:"Date",                 required:false }
      ],
      hint: "Opened from the SharePoint case button, the fields above pre-fill automatically. Check them, then click <strong>Generate &amp; download</strong>."
    },
    "NoticeOfActing": {
      displayName: "Notice of Acting",
      master: "masters/NoticeOfActing.docx",
      refField: "ClaimNo",
      fields: [
        { id:"CourtName",      label:"Court",                required:true  },
        { id:"ClaimNo",        label:"Claim number",         required:true  },
        { id:"ClaimantName",   label:"Claimant",             required:true  },
        { id:"DefendantName",  label:"Defendant",            required:true  },
        { id:"ActingForParty", label:"We act for",           required:true, options:["Claimant","Defendant"] },
        { id:"SignatoryName",  label:"Signing costs lawyer", required:true, options:["Toby Moreton","Tom Winyard","Kelly Townshend"] },
        { id:"DateDay",        label:"Date \u2014 day",      required:false },
        { id:"DateMonth",      label:"Date \u2014 month",    required:false },
        { id:"DateYear",       label:"Date \u2014 year",     required:false }
      ],
      hint: "Opened from the SharePoint case button, the case fields pre-fill automatically. <strong>Pick the party we act for and the signing costs lawyer</strong>, then click <strong>Generate &amp; download</strong>."
    }
  };

  // ================================================================
  // RESOLVE ACTIVE TEMPLATE from ?template= param (default: memo)
  // ================================================================
  var params = new URLSearchParams(window.location.search);
  var templateKey = params.get("template") || "InterPartesMemoOfAdvice";
  var TEMPLATE = TEMPLATES[templateKey] || TEMPLATES["InterPartesMemoOfAdvice"];

  // ================================================================
  // BUILD THE FORM DYNAMICALLY
  // ================================================================
  document.getElementById("doctype").textContent = TEMPLATE.displayName;
  document.getElementById("hint").innerHTML = TEMPLATE.hint;

  var grid = document.getElementById("field-grid");
  TEMPLATE.fields.forEach(function(f){
    var lbl = document.createElement("label");
    lbl.textContent = f.label;
    var inp;
    if(f.options){
      inp = document.createElement("select");
      inp.id = "f_" + f.id;
      f.options.forEach(function(opt){
        var o = document.createElement("option");
        o.value = opt; o.textContent = opt;
        inp.appendChild(o);
      });
    } else {
      inp = document.createElement("input");
      inp.type = "text";
      inp.id = "f_" + f.id;
    }
    lbl.appendChild(inp);
    grid.appendChild(lbl);
  });

  // ================================================================
  // HELPERS
  // ================================================================
  function el(id){ return document.getElementById(id); }

  function flash(msg, cls){
    var s = el("status"); s.textContent = msg;
    s.className = cls || "";
  }

  function deriveDate(){
    var now = new Date();
    var months = ["January","February","March","April","May","June","July",
                  "August","September","October","November","December"];
    return now.getDate() + " " + months[now.getMonth()] + " " + now.getFullYear();
  }

  // ================================================================
  // PREFILL FROM URL PARAMS
  // ================================================================
  TEMPLATE.fields.forEach(function(f){
    var v = params.get(f.id);
    var inp = el("f_"+f.id);
    if(inp && v) inp.value = v;
  });
  var dateEl = el("f_Date");
  if(dateEl && !dateEl.value) dateEl.value = deriveDate();

  // Notice of Acting uses split date parts (day / month / year) — derive today's if blank
  (function deriveDateParts(){
    var now = new Date();
    var months = ["January","February","March","April","May","June","July",
                  "August","September","October","November","December"];
    var dD = el("f_DateDay"), dM = el("f_DateMonth"), dY = el("f_DateYear");
    if(dD && !dD.value) dD.value = String(now.getDate());
    if(dM && !dM.value) dM.value = months[now.getMonth()];
    if(dY && !dY.value) dY.value = String(now.getFullYear());
  })();

  // ================================================================
  // GENERATE
  // ================================================================
  function loadBinary(url){
    return new Promise(function(resolve, reject){
      PizZipUtils.getBinaryContent(url, function(err, data){
        if(err) reject(err); else resolve(data);
      });
    });
  }

  function checkRequired(){
    var missing = [];
    TEMPLATE.fields.forEach(function(f){
      if(!f.required) return;
      var inp = el("f_"+f.id);
      if(!inp) return;
      if(!inp.value.trim()){ missing.push(f.label); inp.classList.add("missing"); }
      else inp.classList.remove("missing");
    });
    return missing;
  }

  function generate(){
    var missing = checkRequired();
    if(missing.length){
      flash("Missing: " + missing.join(", "), "bad");
      return;
    }
    flash("Generating\u2026", "work");
    el("b_make").disabled = true;

    var data = {};
    TEMPLATE.fields.forEach(function(f){
      var inp = el("f_"+f.id);
      data[f.id] = inp ? inp.value.trim() : "";
    });

    // Notice of Acting: uppercase the court and party names (court convention)
    if("CourtName" in data) data.CourtName = data.CourtName.toUpperCase();
    if("ClaimantName" in data) data.ClaimantName = data.ClaimantName.toUpperCase();
    if("DefendantName" in data) data.DefendantName = data.DefendantName.toUpperCase();

    // Notice of Acting: derive the boolean that flips the caption/addressee.
    // True when we act for the Claimant; the master's conditional handles the rest.
    if("ActingForParty" in data){
      var afp = data.ActingForParty.trim();
      data.ActingForClaimant = /^c/i.test(afp);
      // Normalise the body label to canonical case regardless of how it was typed
      data.ActingForParty = data.ActingForClaimant ? "Claimant" : "Defendant";
    }

    loadBinary(TEMPLATE.master).then(function(content){
      var zip = new PizZip(content);
      var doc = new window.docxtemplater(zip, {
        paragraphLoop: true,
        linebreaks: true,
        delimiters: { start: "[[", end: "]]" }
      });
      doc.render(data);
      var out = doc.getZip().generate({
        type: "blob",
        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      });
      var ref = data[TEMPLATE.refField] || "letter";
      var fname = (TEMPLATE.downloadName || templateKey) + "_" + ref + ".docx";
      triggerDownload(out, fname);
      flash("\u2713 Downloaded " + fname, "ok");
      el("b_make").disabled = false;
    }).catch(function(e){
      var msg = (e && e.message) ? e.message : String(e);
      if(e && e.properties && e.properties.errors){
        msg = e.properties.errors.map(function(x){ return x.name + ": " + x.message; }).join("; ");
      }
      flash("Error: " + msg, "bad");
      el("b_make").disabled = false;
    });
  }

  function triggerDownload(blob, filename){
    var a = document.createElement("a");
    var url = URL.createObjectURL(blob);
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
  }

  el("b_make").addEventListener("click", generate);
  el("b_reset").addEventListener("click", function(){
    TEMPLATE.fields.forEach(function(f){
      var inp = el("f_"+f.id);
      if(inp){ inp.value = ""; inp.classList.remove("missing"); }
    });
    if(dateEl) dateEl.value = deriveDate();
    flash("");
    var first = el("f_"+TEMPLATE.fields[0].id);
    if(first) first.focus();
  });

})();
</script>
</body>
</html>
